  </g>

  <!-- Foreheads nearly touching — connection point -->

  <circle cx="256" cy="175" r="5" fill="rgba(255,240,210,0.7)" filter="url(#figureglow)"/>

  <!-- Tiny gold sparkles -->

  <g fill="#e4b87a">
    <circle cx="176" cy="148" r="2.5" opacity="0.7"/>
    <circle cx="165" cy="195" r="1.8" opacity="0.5"/>
    <circle cx="338" cy="142" r="2.5" opacity="0.7"/>
    <circle cx="350" cy="190" r="1.8" opacity="0.5"/>
    <circle cx="256" cy="128" r="2" opacity="0.6"/>
    <circle cx="210" cy="348" r="1.5" opacity="0.5"/>
    <circle cx="304" cy="344" r="1.5" opacity="0.5"/>
  </g>

  <!-- Text -->

<text x="256" y="400"
font-family="Georgia, serif"
font-size="22"
fill="url(#goldText)"
text-anchor="middle"
letter-spacing="5"
opacity="0.95">SACRED PATH</text>
<text x="256" y="424"
font-family="Georgia, serif"
font-size="13"
fill="rgba(192,154,220,0.7)"
text-anchor="middle"
letter-spacing="4">FOR COUPLES</text>
<line x1="190" y1="435" x2="322" y2="435"
stroke="rgba(200,146,74,0.22)" stroke-width="1"/>

  <!-- Vignette -->

  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(9,4,10,0.55)"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#vig)"/>
</svg>
