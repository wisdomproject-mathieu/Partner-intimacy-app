<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#2d0f20"/>
      <stop offset="100%" stop-color="#09040a"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="rgba(210,60,100,0.5)"/>
      <stop offset="70%" stop-color="rgba(160,30,70,0.2)"/>
      <stop offset="100%" stop-color="rgba(160,30,70,0)"/>
    </radialGradient>
    <linearGradient id="heartGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d4547a"/>
      <stop offset="45%" stop-color="#b03060"/>
      <stop offset="100%" stop-color="#6a1030"/>
    </linearGradient>
    <linearGradient id="figureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e8d0"/>
      <stop offset="60%" stop-color="#e8c898"/>
      <stop offset="100%" stop-color="#c8a060"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8924a"/>
      <stop offset="50%" stop-color="#f0e2d0"/>
      <stop offset="100%" stop-color="#c8924a"/>
    </linearGradient>
    <filter id="heartglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="figureglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="none"
    stroke="rgba(200,146,74,0.1)" stroke-width="2"/>

  <!-- Heart glow bloom -->

  <ellipse cx="256" cy="220" rx="175" ry="160" fill="url(#heartGlow)"/>

  <!-- HEART — clean classic shape -->

<path d="M256,345
C250,338 100,255 100,168
C100,125 132,96 174,96
C204,96 230,112 256,140
C282,112 308,96 338,96
C380,96 412,125 412,168
C412,255 262,338 256,345 Z"
fill="url(#heartGrad)" filter="url(#heartglow)" opacity="0.88"/>

  <!-- Heart gloss highlight -->

<path d="M174,112 C152,124 138,148 140,170"
fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="8"
stroke-linecap="round"/>
<ellipse cx="205" cy="130" rx="18" ry="10"
fill="rgba(255,255,255,0.08)" transform="rotate(-35 205 130)"/>

  <!-- ── FEMININE FIGURE (left) — sitting, leaning right ── -->

  <g filter="url(#figureglow)">
    <!-- Head with hair -->
    <circle cx="216" cy="178" r="22" fill="url(#figureGrad)"/>
    <!-- Hair — flowing to shoulders -->
    <path d="M196,172 C190,158 193,144 204,138 C215,132 230,136 236,146
             C240,154 238,166 232,174 C228,178 222,180 216,180"
      fill="#c8a060" opacity="0.75"/>
    <path d="M194,176 C188,190 190,208 194,220"
      fill="none" stroke="#c8a060" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

```
<!-- Neck -->
<path d="M210,198 L222,198 L224,212 L208,212 Z" fill="url(#figureGrad)"/>

<!-- Body — feminine, slightly smaller, leaning right -->
<path d="M200,212 C194,216 190,228 190,244
         C190,260 192,276 196,290
         L238,290 C240,276 240,260 238,244
         C236,230 232,218 226,212 Z"
  fill="url(#figureGrad)" opacity="0.92"/>

<!-- Left arm resting on knee -->
<path d="M192,240 C184,252 180,264 182,278"
  fill="none" stroke="url(#figureGrad)" stroke-width="10"
  stroke-linecap="round" opacity="0.88"/>

<!-- Right arm reaching toward partner -->
<path d="M234,232 C244,226 254,222 264,224"
  fill="none" stroke="url(#figureGrad)" stroke-width="11"
  stroke-linecap="round" opacity="0.92"/>

<!-- Legs — crossed, sitting -->
<!-- Left leg -->
<path d="M198,290 C192,302 186,316 188,330
         C196,332 208,330 214,322 C216,314 216,304 214,294 Z"
  fill="url(#figureGrad)" opacity="0.88"/>
<!-- Right leg crossing over -->
<path d="M222,290 C228,298 234,312 232,326
         C224,330 214,328 210,320 C208,312 210,300 216,292 Z"
  fill="url(#figureGrad)" opacity="0.82"/>

<!-- Foot left -->
<ellipse cx="192" cy="332" rx="10" ry="6" fill="url(#figureGrad)" opacity="0.8"/>
<!-- Foot right -->
<ellipse cx="228" cy="328" rx="10" ry="6" fill="url(#figureGrad)" opacity="0.75"/>
```

  </g>

  <!-- ── MASCULINE FIGURE (right) — sitting, leaning left, slightly larger ── -->

  <g filter="url(#figureglow)">
    <!-- Head — slightly larger, no flowing hair -->
    <circle cx="296" cy="174" r="25" fill="url(#figureGrad)"/>
    <!-- Short hair suggestion -->
    <path d="M274,166 C272,152 280,140 294,138 C308,136 320,144 322,156
             C324,164 320,172 314,176"
      fill="#c8a060" opacity="0.55"/>

```
<!-- Neck -->
<path d="M289,197 L303,197 L305,212 L287,212 Z" fill="url(#figureGrad)"/>

<!-- Body — broader shoulders -->
<path d="M274,212 C268,216 264,230 264,248
         C264,264 266,280 270,292
         L318,292 C320,280 320,264 318,248
         C316,232 310,218 304,212 Z"
  fill="url(#figureGrad)" opacity="0.92"/>

<!-- Left arm reaching toward partner -->
<path d="M268,234 C258,228 248,224 238,226"
  fill="none" stroke="url(#figureGrad)" stroke-width="12"
  stroke-linecap="round" opacity="0.92"/>

<!-- Right arm resting on knee -->
<path d="M318,242 C326,254 330,268 328,280"
  fill="none" stroke="url(#figureGrad)" stroke-width="11"
  stroke-linecap="round" opacity="0.88"/>

<!-- Legs — crossed, sitting -->
<!-- Left leg -->
<path d="M272,292 C266,306 262,320 264,334
         C272,336 286,334 290,324 C292,314 290,302 286,294 Z"
  fill="url(#figureGrad)" opacity="0.88"/>
<!-- Right leg -->
<path d="M304,292 C312,304 318,318 316,332
         C308,336 296,332 292,322 C290,312 294,300 300,292 Z"
  fill="url(#figureGrad)" opacity="0.85"/>

<!-- Foot left -->
<ellipse cx="266" cy="336" rx="11" ry="6" fill="url(#figureGrad)" opacity="0.8"/>
<!-- Foot right -->
<ellipse cx="312" cy="334" rx="11" ry="6" fill="url(#figureGrad)" opacity="0.78"/>
