/* === TOKENS === */

/* === BOTTOM NAV === */

var store = (function() {
  var mem = {};

    return {
      get: function(k) { try { return localStorage.getItem(k); } catch(e) { return mem[k] || null; } },
      set: function(k, v) { try { localStorage.setItem(k, v); } catch(e) { mem[k] = v; } }
    };
  } catch(e) {
    return {
      get: function(k) { return mem[k] || null; },
      set: function(k, v) { mem[k] = v; }
    };
  }
})();

function load(k, def) {
  try { var v = store.get(k); return v ? JSON.parse(v) : def; } catch(e) { return def; }

function esc(s) {
  return (s || '').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tag(t) {
  return '<span class="tag t-' + t + '">' + t + '</span>';
}
function tagH(t) { return tag(t); }
function favBtn(id) {
  var on = S.favs.indexOf(id) > -1;
  return '<button class="fvb ' + (on ? 'on' : '') + '" onclick="event.stopPropagation();togFav(\'' + id + '\');refreshFav(this)">' + (on ? '♥' : '♡') + '</button>';
}
function togFav(id) {
  var i = S.favs.indexOf(id);
  if (i > -1) S.favs.splice(i, 1); else S.favs.push(id);
  persist();
}
function refreshFav(btn) {
  var id = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
  var on = S.favs.indexOf(id) > -1;
  btn.className = 'fvb ' + (on ? 'on' : '');
  btn.textContent = on ? '♥' : '♡';
}

// ── NAVIGATION ─────────────────────────────────────────────────
function go(p) {
  try {
    document.querySelectorAll('.page').forEach(function(el) {
      el.classList.remove('show');
    });
    var pg = document.getElementById('pg-' + p);
    if (pg) pg.classList.add('show');

    document.querySelectorAll('[data-p]').forEach(function(b) {
      b.classList.toggle('act', b.getAttribute('data-p') === p);
    });

    S.page = p;
    window.scrollTo(0, 0);

    var renders = {
      home: renderHome,
      positions: renderPositions,
      sequences: renderSequences,
      practices: renderPractices,
      deida: renderDeida,
      share: renderShare,
      whispers: renderWhispers
    };
    if (renders[p]) renders[p]();
  } catch(e) {
    console.error('go() error:', e);
  }
}

function openSeq(id) { S.seqActive = id; S.seqPhase = 0; renderSequences(); }

function renderSeqDetail(id) {
  var seq = null;
  for (var i = 0; i < sequences.length; i++) { if (sequences[i].id === id) { seq = sequences[i]; break; } }
  if (!seq) { S.seqActive = null; renderSequences(); return; }

  var ph = seq.phases[S.seqPhase];
  var phbtHtml = '';
  for (var i = 0; i < seq.phases.length; i++) {
    phbtHtml += '<button class="phbt ' + (i === S.seqPhase ? 'on' : '') + '" onclick="S.seqPhase=' + i + ';renderSeqDetail(\'' + id + '\')">' +
      '<span class="phbtn">' + (i+1) + '</span>' + esc(seq.phases[i].name) + '</button>';
  }

  var navHtml = '';
  if (S.seqPhase > 0) navHtml += '<button class="btn btn-o btn-s" onclick="S.seqPhase--;renderSeqDetail(\'' + id + '\')">← Previous</button>';
  if (S.seqPhase < seq.phases.length - 1) {
    navHtml += '<button class="btn btn-g btn-s" onclick="S.seqPhase++;renderSeqDetail(\'' + id + '\')">Next: ' + esc(seq.phases[S.seqPhase + 1].name) + ' →</button>';
  } else {
    navHtml += '<div class="done"><span>✦</span><em>Journey complete. Rest together in silence.</em></div>';

  document.getElementById('pg-sequences').innerHTML =

function sendMsg() {
var ta = document.getElementById(‘msgTA’);
if (!ta || !ta.value.trim()) return;
S.msgs.unshift({ id: Date.now(), text: ta.value.trim(), from: S.user || ‘You’, to: S.partner || ‘Partner’, mood: S.shareMood, time: new Date().toISOString() });
if (S.msgs.length > 50) S.msgs.length = 50;
persist();
var st = document.getElementById(‘sentT’);
if (st) { st.style.display = ‘block’; setTimeout(function() { st.style.display = ‘none’; }, 2500); }
ta.value = ‘’;
document.getElementById(‘cc’).textContent = ‘0 characters’;
var sb = document.getElementById(‘svBtn’);
if (sb) sb.style.display = ‘none’;
}
function nShare() {
var text = (document.getElementById(‘msgTA’) || {}).value || ‘’;
if (!text) return;
doShare(text);
}
function qShare(text) { doShare(text); }
function doShare(text) {
if (navigator.share) {
navigator.share({ text: text, title: ‘A whisper for you ✨’ }).catch(function() {});
} else {
try { navigator.clipboard.writeText(text).then(function() { alert(‘Copied to clipboard!’); }); }
catch(e) { alert(‘Copied!’); }
}
}
function useText(text) {
S.shareTab = ‘compose’;
renderShare();
setTimeout(function() {
var ta = document.getElementById(‘msgTA’);
if (ta) {
ta.value = text;
var cc = document.getElementById(‘cc’);
if (cc) cc.textContent = text.length + ’ characters’;
var sb = document.getElementById(‘svBtn’);
if (sb) sb.style.display = ‘inline-flex’;
}
}, 60);
}

function init() {

document.body.insertAdjacentHTML(‘afterbegin’, ‘<div style="background:#c0415f;color:#fff;padding:16px;text-align:center;font-size:.85rem;position:fixed;top:60px;left:0;right:0;z-index:999">App failed to load: ’ + esc(e.message) + ’ — please refresh.</div>’);
}
}

if (document.readyState === ‘loading’) {
document.addEventListener(‘DOMContentLoaded’, init);
} else {

}
