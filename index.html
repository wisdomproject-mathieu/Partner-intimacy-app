<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Intimacy</title>
<style>
:root{
  --ink:#09040a;--surf:#1c0e18;--card:#1e0f1a;--muted:#3a1e30;
  --border:rgba(200,140,90,.16);--gold:#c8924a;--goldl:#e4b87a;
  --rose:#c0415f;--rosel:#e06e88;--cream:#f0e2d0;
  --text:#e4cebb;--tm:#957060;--td:#6a4858;--blue:#9ab0e8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  background:#09040a;color:#e4cebb;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-weight:300;min-height:100vh;
  padding-bottom:calc(68px + env(safe-area-inset-bottom,0px));
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:Georgia,'Times New Roman',serif;font-weight:400;line-height:1.2}
h1{font-size:clamp(1.8rem,5vw,3.2rem)}
h2{font-size:clamp(1.4rem,3.5vw,2.4rem)}
h3{font-size:1.4rem}
h4{font-size:1.15rem}
p{line-height:1.78;font-size:.92rem}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}

/* NAV */
.tnav{
position:fixed;top:0;left:0;right:0;z-index:200;height:58px;
background:rgba(9,4,10,.9);
-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
border-bottom:1px solid rgba(200,140,90,.16);
}
.tnav-i{max-width:1100px;margin:0 auto;padding:0 16px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-family:Georgia,serif;font-size:1.2rem;color:#f0e2d0;background:none;border:none;padding:0;cursor:pointer}
.logo-sym{color:#c8924a}
.dnav{display:flex;gap:2px;list-style:none}
.dnav-btn{background:none;border:none;padding:6px 11px;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#6a4858;border-radius:6px;transition:color .2s}
.dnav-btn:hover,.dnav-btn.act{color:#c8924a}
.dnav-btn.act{background:rgba(200,146,74,.1)}
.bnav{
position:fixed;bottom:0;left:0;right:0;z-index:200;
background:rgba(9,4,10,.96);
-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
border-top:1px solid rgba(200,140,90,.16);
display:flex;padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn{
flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
padding:8px 2px 6px;background:none;border:none;color:#5a3848;
font-size:.55rem;letter-spacing:.07em;text-transform:uppercase;
}
.bnav-btn .bi{font-size:1.1rem;display:block;line-height:1.2}
.bnav-btn.act{color:#c8924a}

/* LAYOUT */
.page{display:none;padding:70px 0 32px;min-height:100vh}
.page.on{display:block}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px}
.lbl{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#c8924a;margin-bottom:6px;display:block}
.divl{height:1px;background:rgba(200,140,90,.16);margin:38px 0}
.divg{height:1px;background:linear-gradient(90deg,transparent,#c8924a,transparent);margin:38px 0}

/* CARDS */
.card{background:#1e0f1a;border:1px solid rgba(200,140,90,.16);border-radius:14px;padding:20px}
.card-hover{transition:transform .22s,border-color .22s,box-shadow .22s;cursor:pointer}
.card-hover:hover{transform:translateY(-2px);border-color:rgba(200,146,74,.3);box-shadow:0 6px 30px rgba(0,0,0,.5)}

/* BTNS */
.btn{display:inline-flex;align-items:center;padding:9px 18px;border-radius:8px;font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.75}
.btn-g{background:linear-gradient(135deg,#c8924a,#e4b87a);color:#09040a;font-weight:600}
.btn-r{background:linear-gradient(135deg,#c0415f,#e06e88);color:#fff}
.btn-o{background:none;border:1px solid rgba(200,140,90,.16);color:#957060}
.btn-s{padding:7px 13px;font-size:.7rem}

/* TAGS */
.tag{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
.t-tantra{background:rgba(192,65,95,.14);color:#e06e88;border:1px solid rgba(192,65,95,.24)}
.t-tao{background:rgba(200,146,74,.12);color:#e4b87a;border:1px solid rgba(200,146,74,.24)}
.t-deida{background:rgba(100,130,210,.12);color:#9ab0e8;border:1px solid rgba(100,130,210,.22)}

/* FILTERS */
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}
.fbt{padding:6px 14px;border-radius:20px;font-size:.71rem;color:#957060;border:1px solid rgba(200,140,90,.16);background:transparent;cursor:pointer;transition:all .2s}
.fbt.on{background:rgba(200,146,74,.11);border-color:#c8924a;color:#c8924a}

/* GRIDS */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.gcol{display:flex;flex-direction:column;gap:12px}

/* ANIM */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.a0{animation:up .4s ease both}
.a1{animation:up .4s .06s ease both}
.a2{animation:up .4s .12s ease both}
.a3{animation:up .4s .18s ease both}

/* HOME HERO */
.hero{text-align:center;padding:14px 0 44px}
.hero-name{font-size:clamp(1.8rem,5vw,3.2rem);font-family:Georgia,serif;font-weight:400;margin-bottom:12px;
background:linear-gradient(145deg,#f0e2d0 0%,#e4b87a 50%,#e06e88 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:#957060;max-width:420px;margin:0 auto 22px;font-size:.92rem;line-height:1.82}
.name-row{display:flex;align-items:center;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.name-inp{background:#1e0f1a;border:1px solid rgba(200,140,90,.16);border-radius:8px;color:#e4cebb;font-family:inherit;font-size:.86rem;padding:9px 13px;outline:none;width:145px;transition:border-color .2s}
.name-inp:focus{border-color:#c8924a}
.name-inp::placeholder{color:#6a4858}
.amp{font-family:Georgia,serif;font-size:1.4rem;color:#c8924a}

/* WHISPER CARDS */
.wtime{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:#c8924a}
.wtxt{font-family:Georgia,serif;font-size:1.06rem;font-style:italic;line-height:1.72;color:#f0e2d0;margin:8px 0}

/* PILLAR CARDS */
.pcard{display:flex;flex-direction:column;gap:8px}
.pcard h4{font-size:1.32rem;font-family:Georgia,serif}
.pcard p{color:#957060;font-size:.83rem;line-height:1.7}
.pcard .go{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:#5a3848;margin-top:auto}
.pc-rose h4{color:#e06e88}.pc-gold h4{color:#e4b87a}.pc-blue h4{color:#9ab0e8}.pc-vio h4{color:#c09ae0}

/* QUICK NAV */
.qnav{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-top:20px}
.qni{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 5px;cursor:pointer;text-align:center}
.qni-em{font-size:1.1rem;color:#c8924a;display:block}
.qni-lb{font-size:.72rem;color:#e4cebb}

/* POSITIONS */
.poc-em{font-size:1.75rem;display:block;margin-bottom:6px}
.poc-name{font-family:Georgia,serif;font-size:1.12rem;color:#f0e2d0;margin:4px 0}
.poc-short{color:#957060;font-size:.83rem;line-height:1.6;flex:1}
.poc-meta{display:flex;justify-content:space-between;font-size:.68rem;color:#6a4858;margin-top:6px}
.poc-top{display:flex;align-items:flex-start;justify-content:space-between}
.fav-btn{font-size:1.1rem;color:#6a4858;background:none;border:none;cursor:pointer;padding:2px}
.fav-btn.on{color:#c0415f}
.new-badge{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:#e06e88;background:rgba(192,65,95,.12);border:1px solid rgba(192,65,95,.2);padding:2px 7px;border-radius:10px}

/* DETAIL */
.det-head{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.det-em{font-size:2.6rem;flex-shrink:0}
.det-meta{display:flex;gap:13px;font-size:.72rem;color:#6a4858;flex-wrap:wrap;margin:7px 0}
.det-desc{color:#957060;max-width:640px;line-height:1.9;margin-bottom:28px;font-size:.9rem;white-space:pre-line}
.det-sec{font-family:Georgia,serif;font-size:1.1rem;color:#e4b87a;margin-bottom:12px}
.steps{list-style:none;display:flex;flex-direction:column;gap:10px;max-width:640px;margin-bottom:28px}
.step{display:flex;gap:11px;align-items:flex-start}
.step-n{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1px solid rgba(200,140,90,.16);display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#c8924a;margin-top:1px}
.step p{color:#957060;line-height:1.72;font-size:.88rem}
.bens{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:28px}
.ben{font-size:.75rem;color:#957060;background:#1c0e18;border:1px solid rgba(200,140,90,.16);padding:4px 10px;border-radius:20px}
.tip-box{display:flex;gap:11px;background:rgba(200,146,74,.06);border:1px solid rgba(200,146,74,.14);border-radius:12px;padding:15px 17px;max-width:640px}
.tip-box p{color:#957060;font-size:.86rem;line-height:1.8;font-style:italic}

/* SEQUENCES */
.seq-name{font-family:Georgia,serif;font-size:1.38rem;color:#f0e2d0;margin:5px 0}
.seq-tags{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.mood{font-size:.59rem;letter-spacing:.09em;text-transform:uppercase;padding:2px 8px;border-radius:10px}
.m-soft{background:rgba(192,65,95,.1);color:#e06e88;border:1px solid rgba(192,65,95,.2)}
.m-passionate{background:rgba(200,146,74,.1);color:#e4b87a;border:1px solid rgba(200,146,74,.2)}
.m-meditative{background:rgba(100,130,210,.1);color:#9ab0e8;border:1px solid rgba(100,130,210,.2)}
.seq-dur{font-size:.72rem;color:#c8924a}
.seq-desc{color:#957060;font-size:.83rem;margin-bottom:13px}
.ph-row{display:flex;border:1px solid rgba(200,140,90,.16);border-radius:8px;overflow:hidden;margin-bottom:13px}
.ph-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-right:1px solid rgba(200,140,90,.16);background:#1c0e18;text-align:center}
.ph-item:last-child{border-right:none}
.ph-num{width:16px;height:16px;border-radius:50%;background:rgba(200,146,74,.14);color:#c8924a;font-size:.59rem;display:flex;align-items:center;justify-content:center}
.ph-name{font-size:.66rem;color:#957060}
.ph-dur{font-size:.58rem;color:#6a4858}
.ph-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.ph-nav-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:7px;border:1px solid rgba(200,140,90,.16);color:#957060;font-size:.75rem;cursor:pointer;background:transparent;transition:all .2s}
.ph-nav-btn.on{background:rgba(200,146,74,.1);border-color:#c8924a;color:#c8924a}
.ph-num2{width:16px;height:16px;border-radius:50%;background:rgba(200,146,74,.14);color:#c8924a;font-size:.59rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.phase-box{padding:22px}
.phase-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.phase-dur{font-size:.72rem;color:#c8924a}
.phase-inst{color:#957060;line-height:1.9;max-width:580px;margin-bottom:22px;font-size:.9rem}
.phase-btns{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.done-msg{color:#c8924a;font-style:italic;font-size:.87rem}

/* PRACTICES */
.trad-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.trad-btn{padding:8px 16px;border-radius:20px;font-size:.73rem;letter-spacing:.07em;border:1px solid rgba(200,140,90,.16);color:#957060;background:transparent;cursor:pointer;transition:all .2s}
.trad-btn.sel-tantra{background:rgba(192,65,95,.09);border-color:#c0415f;color:#e06e88}
.trad-btn.sel-tao{background:rgba(200,146,74,.09);border-color:#c8924a;color:#e4b87a}
.trad-btn.sel-deida{background:rgba(100,130,210,.09);border-color:rgba(100,130,210,.4);color:#9ab0e8}
.trad-btn.sel-all{background:rgba(200,146,74,.09);border-color:#c8924a;color:#e4b87a}
.type-row{display:flex;gap:6px;margin-bottom:22px}
.type-btn{padding:6px 12px;border-radius:12px;font-size:.69rem;border:1px solid rgba(200,140,90,.16);color:#6a4858;background:transparent;cursor:pointer;transition:all .2s}
.type-btn.on{border-color:rgba(200,146,74,.3);color:#957060}
.prac-item{background:#1e0f1a;border:1px solid rgba(200,140,90,.16);border-radius:12px;overflow:hidden;margin-bottom:3px;transition:border-color .2s}
.prac-item.open{border-color:rgba(200,146,74,.24)}
.prac-head{display:flex;align-items:center;justify-content:space-between;padding:17px 19px;cursor:pointer;gap:10px}
.prac-tags{display:flex;gap:6px;margin-bottom:5px}
.prac-type{font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:#6a4858;border:1px solid rgba(200,140,90,.16);padding:2px 7px;border-radius:10px}
.prac-name{font-family:Georgia,serif;font-size:1.15rem;color:#f0e2d0;margin-bottom:2px}
.prac-dur{font-size:.68rem;color:#6a4858}
.prac-tog{font-size:1.35rem;color:#c8924a;flex-shrink:0}
.prac-body{padding:0 19px 21px;border-top:1px solid rgba(200,140,90,.16);padding-top:17px}
.prac-desc{color:#957060;font-size:.88rem;line-height:1.84;max-width:620px;margin-bottom:15px}
.prac-src{font-size:.7rem;color:#6a4858;padding-top:10px;border-top:1px solid rgba(200,140,90,.16);font-style:italic}
.phil-name{font-family:Georgia,serif;font-size:1.25rem}
.ph-rose .phil-name{color:#e06e88}.ph-gold .phil-name{color:#e4b87a}.ph-blue .phil-name{color:#9ab0e8}
.phil-quote{font-family:Georgia,serif;font-style:italic;font-size:.94rem;color:#957060;padding-left:10px;border-left:2px solid rgba(200,140,90,.16)}
.phil-body{font-size:.8rem;color:#6a4858;line-height:1.76}

/* DEIDA */
.d-hero{text-align:center;padding:8px 0 44px}
.d-title{font-family:Georgia,serif;font-size:clamp(1.8rem,5vw,3.2rem);
background:linear-gradient(145deg,#c8b0f0,#9ab0e8,#e4b87a);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.d-sub{color:#957060;max-width:470px;margin:12px auto 0;font-size:.92rem;line-height:1.82}
.book-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:26px}
.book-tab{padding:8px 15px;border-radius:20px;font-size:.71rem;letter-spacing:.07em;border:1px solid rgba(200,140,90,.16);color:#957060;background:transparent;cursor:pointer;transition:all .22s}
.book-tab.on{background:rgba(100,130,210,.12);border-color:rgba(100,130,210,.4);color:#9ab0e8}
.wisdom-card{background:#1e0f1a;border:1px solid rgba(200,140,90,.16);border-radius:14px;padding:24px 24px 19px;position:relative;overflow:hidden;margin-bottom:16px}
.wisdom-card::before{content:’’;position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,#c0415f,#c8924a)}
.w-book{font-size:.62rem;letter-spacing:.17em;text-transform:uppercase;color:#9ab0e8;margin-bottom:12px;display:block}
.w-quote{font-family:Georgia,serif;font-size:clamp(1rem,2.2vw,1.32rem);font-style:italic;line-height:1.75;color:#f0e2d0;margin-bottom:15px;padding:0 4px}
.w-insight{color:#957060;font-size:.87rem;line-height:1.82;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid rgba(200,146,74,.2)}
.w-insight strong{color:#e4b87a;font-weight:400}
.w-foot{display:flex;justify-content:space-between;align-items:center;margin-top:13px;flex-wrap:wrap;gap:8px}
.w-themes{display:flex;gap:6px;flex-wrap:wrap}
.w-theme{font-size:.59rem;letter-spacing:.09em;text-transform:uppercase;padding:3px 8px;border-radius:10px;background:rgba(100,130,210,.1);color:#9ab0e8;border:1px solid rgba(100,130,210,.17)}
.d-strip{background:linear-gradient(135deg,rgba(100,80,180,.08),rgba(192,65,95,.06));border:1px solid rgba(100,130,210,.17);border-radius:14px;padding:28px;text-align:center}
.d-strip h3{color:#c8b0f0;margin-bottom:10px}
.d-strip p{color:#957060;max-width:490px;margin:0 auto 18px;line-height:1.82}

/* SHARE */
.share-tabs{display:flex;gap:2px;margin-bottom:22px;background:#1e0f1a;border:1px solid rgba(200,140,90,.16);border-radius:12px;padding:3px;width:fit-content}
.share-tab{padding:7px 14px;border-radius:9px;font-size:.73rem;letter-spacing:.07em;color:#957060;cursor:pointer;background:transparent;border:none;transition:all .2s}
.share-tab.on{background:#3a1e30;color:#f0e2d0}
.msg-area{background:#1c0e18;border:1px solid rgba(200,140,90,.16);border-radius:8px;color:#e4cebb;font-family:Georgia,serif;font-size:1.02rem;font-style:italic;line-height:1.72;padding:13px;resize:vertical;outline:none;transition:border-color .2s;margin-bottom:10px;width:100%}
.msg-area:focus{border-color:#c0415f}
.msg-area::placeholder{color:#6a4858}
.mood-row{display:flex;gap:5px}
.mood-btn{padding:5px 9px;border-radius:10px;font-size:.67rem;border:1px solid rgba(200,140,90,.16);color:#6a4858;cursor:pointer;background:transparent;transition:all .2s}
.mood-btn.on{background:#3a1e30;border-color:rgba(200,146,74,.3);color:#e4cebb}
.compose-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;font-size:.79rem;color:#957060;flex-wrap:wrap;gap:9px}
.compose-foot{display:flex;justify-content:space-between;align-items:center}
.char-c{font-size:.67rem;color:#6a4858}
.act-row{display:flex;gap:6px}
.sent-notice{margin-top:10px;padding:9px 13px;background:rgba(200,146,74,.07);border:1px solid rgba(200,146,74,.15);border-radius:8px;font-size:.77rem;color:#e4b87a}
.tease-txt{font-family:Georgia,serif;font-size:1.03rem;font-style:italic;color:#e4cebb;line-height:1.65;margin-bottom:10px}
.tease-foot{display:flex;justify-content:space-between;align-items:center}
.tease-lbl{font-size:.59rem;letter-spacing:.09em;text-transform:uppercase;color:#6a4858}
.msg-row{display:flex;gap:6px}
.hist-from{color:#c8924a;font-size:.7rem}
.hist-time{color:#6a4858;font-size:.7rem}
.hist-txt{font-family:Georgia,serif;font-style:italic;font-size:.99rem;color:#957060;line-height:1.65}

/* WHISPERS */
.tod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:13px}
.tod-card{display:flex;flex-direction:column;gap:11px;min-height:158px}
.tod-g{border-color:rgba(200,146,74,.22)}.tod-r{border-color:rgba(192,65,95,.22)}.tod-b{border-color:rgba(100,160,100,.22)}
.tod-hdr{display:flex;align-items:center;gap:7px}
.tod-lbl{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;color:#6a4858}
.tod-txt{font-family:Georgia,serif;font-style:italic;font-size:1rem;color:#f0e2d0;line-height:1.7;flex:1}
.reveal-btn{border:1px dashed rgba(200,140,90,.16);color:#c8924a;font-size:.71rem;letter-spacing:.1em;padding:8px;border-radius:7px;background:transparent;cursor:pointer;margin-top:auto;transition:all .22s}
.reveal-btn:hover{border-color:#c8924a;background:rgba(200,146,74,.08)}
.w-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}
.w-cat{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#6a4858}
.w-txt{font-family:Georgia,serif;font-style:italic;font-size:.94rem;color:#957060;line-height:1.65;flex:1}

/* RESPONSIVE */
@media(max-width:900px){.g3,.tod-grid{grid-template-columns:repeat(2,1fr)}.qnav{grid-template-columns:repeat(3,1fr)}}

/* ===================================================

function go(page){
  S.page = page;

  var pg = document.getElementById('pg-'+page);
  if(pg) pg.classList.add('on');
  qa('[data-page]').forEach(function(b){ b.classList.toggle('act', b.getAttribute('data-page')===page) });
  window.scrollTo(0,0);
  var map = {home:renderHome,positions:renderPositions,sequences:renderSequences,practices:renderPractices,deida:renderDeida,share:renderShare,whispers:renderWhispers};
  if(map[page]) try{ map[page]() }catch(err){ showErr(page,err) }
}

function showErr(page,err){
  setHTML('pg-'+page, '<div class="wrap" style="padding:40px 0;text-align:center"><p style="color:#c8924a;font-size:1rem">Error loading '+e(page)+'</p><p style="color:#6a4858;font-size:.8rem;margin-top:8px">'+e(err&&err.message)+'</p></div>')
}

/* delegate all clicks to document */
document.addEventListener('click', function(ev){
  var t = ev.target;
  /* walk up to find data-action */
  var el = t;
  while(el && el !== document.body){
    var action = el.getAttribute('data-action');
    var page   = el.getAttribute('data-page');
    if(action){ handleAction(action, el, ev); return }
    if(page && (el.tagName==='BUTTON'||el.tagName==='A')){ go(page); return }
    el = el.parentElement;
  }
});

    case 'open-pos':    S.posDetail=id; go('positions'); break;
    case 'back-pos':    S.posDetail=null; go('positions'); break;
    case 'pos-filter':  S.posFilter=val; renderPositions(); break;
    case 'open-seq':    S.seqActive=id; S.seqPhase=0; go('sequences'); break;
    case 'back-seq':    S.seqActive=null; go('sequences'); break;
    case 'seq-filter':  S.seqFilter=val; renderSequences(); break;
    case 'seq-phase':   S.seqPhase=parseInt(val)||0; renderSeqDetail(S.seqActive); break;
    case 'seq-prev':    S.seqPhase--; renderSeqDetail(S.seqActive); break;
    case 'seq-next':    S.seqPhase++; renderSeqDetail(S.seqActive); break;
    case 'prac-trad':   S.pracTrad=val; renderPractices(); break;
    case 'prac-type':   S.pracType=val; renderPractices(); break;
    case 'prac-open':   S.pracOpen=(S.pracOpen===id?null:id); renderPractices(); break;
    case 'deida-book':  S.deidaBook=val; renderDeida(); break;
    case 'dsave':       var di=S.dSaved.indexOf(id); if(di>-1)S.dSaved.splice(di,1); else S.dSaved.push(id); persist(); renderDeida(); break;
    case 'share-tab':   S.shareTab=val; renderShareBody(); break;
    case 'mood':        S.shareMood=val; qa('.mood-btn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-val')===val)}); break;
    case 'send-msg':    sendMsg(); break;
    case 'nshare':      doShare(getTA()); break;
    case 'use-text':    useText(el.getAttribute('data-txt')); break;
    case 'qshare':      doShare(el.getAttribute('data-txt')); break;
    case 'reveal':      S.revealed[val]=true; renderWhispers(); break;
    case 'w-filter':    S.wFilter=val; renderWhispers(); break;
    case 'save-names':  saveNames(); break;
    case 'edit-names':  showNameForm(); break;
  }
}

function doShare(text){
if(!text||!text.trim()) return;
if(navigator.share){navigator.share({text:text}).catch(function(){})}
else{try{navigator.clipboard.writeText(text).then(function(){alert(‘Copied!’)})}catch(ex){alert(‘Copied!’)}}
}
function useText(text){
S.shareTab=‘compose’;
renderShare();

},80);
}
