<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intimacy — Sacred Connection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #09040a;
  --deep:   #120810;
  --surf:   #1c0e18;
  --card:   #241220;
  --muted:  #3a1e30;
  --border: rgba(210,155,110,.14);
  --gold:   #c8924a;
  --goldl:  #e4b87a;
  --rose:   #c0415f;
  --rosel:  #e06e88;
  --cream:  #f0e2d0;
  --text:   #e4cebb;
  --tm:     #957060;
  --td:     #5a3840;
}
html { font-size:16px; scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 72px;
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(192,65,95,.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(200,146,74,.08) 0%, transparent 60%);
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius:2px; }
h1,h2,h3,h4 { font-family:'Cormorant Garamond',serif; font-weight:400; line-height:1.2; }
h1 { font-size: clamp(2rem,6vw,3.6rem); }
h2 { font-size: clamp(1.7rem,4vw,2.8rem); }
h3 { font-size: clamp(1.3rem,3vw,1.8rem); }
p  { line-height:1.78; font-size:.92rem; }
button { font-family:'Jost',sans-serif; cursor:pointer; }

/* TOP NAV */
.topnav {
position:fixed; top:0; left:0; right:0; z-index:200; height:60px;
background:rgba(9,4,10,.82);
backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
border-bottom:1px solid var(–border);
}
.topnav-inner {
max-width:1200px; margin:0 auto; padding:0 20px;
height:100%; display:flex; align-items:center; justify-content:space-between;
}
.nav-logo { display:flex; align-items:center; gap:8px; font-family:‘Cormorant Garamond’,serif; font-size:1.3rem; color:var(–cream); cursor:pointer; user-select:none; }
.nav-logo-sym { color:var(–gold); font-size:1.4rem; }
.nav-desktop { display:flex; gap:2px; list-style:none; }
.nav-desktop button { background:none; border:none; padding:7px 13px; font-size:.73rem; letter-spacing:.1em; text-transform:uppercase; color:var(–tm); border-radius:6px; transition:color .2s,background .2s; }
.nav-desktop button:hover { color:var(–text); }
.nav-desktop button.active { color:var(–gold); background:rgba(200,146,74,.09); }

/* BOTTOM TAB NAV */
.bottom-nav {
position:fixed; bottom:0; left:0; right:0; z-index:200;
background:rgba(9,4,10,.94);
backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
border-top:1px solid var(–border);
display:flex;
padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn {
flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
padding:10px 4px 8px; background:none; border:none; color:var(–td);
font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; transition:color .2s;
}
.bnav-btn .bicon { font-size:1.15rem; line-height:1; }
.bnav-btn:hover,.bnav-btn.active { color:var(–gold); }
.bnav-btn.active .bicon { text-shadow:0 0 14px rgba(200,146,74,.7); }

/* LAYOUT */
.page { display:none; min-height:100vh; padding:80px 0 40px; }
.page.active { display:block; }
.container { max-width:1100px; margin:0 auto; padding:0 20px; }
.label { font-size:.65rem; letter-spacing:.22em; text-transform:uppercase; color:var(–gold); margin-bottom:6px; display:block; }
.divider { height:1px; background:var(–border); margin:44px 0; }
.divider-gold { height:1px; background:linear-gradient(90deg,transparent,var(–gold),transparent); margin:44px 0; }

/* CARDS */
.card { background:var(–card); border:1px solid var(–border); border-radius:14px; padding:22px; transition:transform .25s,border-color .25s,box-shadow .25s; }
.card:hover { transform:translateY(-3px); border-color:rgba(200,146,74,.28); box-shadow:0 8px 40px rgba(0,0,0,.4); }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:7px; padding:11px 22px; border-radius:8px; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; border:none; transition:opacity .2s,transform .2s; cursor:pointer; }
.btn:hover { opacity:.82; transform:translateY(-1px); }
.btn-gold { background:linear-gradient(135deg,var(–gold),var(–goldl)); color:var(–ink); font-weight:500; }
.btn-rose { background:linear-gradient(135deg,var(–rose),var(–rosel)); color:#fff; }
.btn-ghost { background:none; border:1px solid var(–border); color:var(–tm); }
.btn-ghost:hover { border-color:var(–gold); color:var(–gold); }
.btn-sm { padding:8px 16px; font-size:.72rem; }

/* TAGS */
.tag { display:inline-flex; align-items:center; padding:3px 11px; border-radius:20px; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; }
.tag-tantra { background:rgba(192,65,95,.15); color:var(–rosel); border:1px solid rgba(192,65,95,.25); }
.tag-tao    { background:rgba(200,146,74,.12); color:var(–goldl); border:1px solid rgba(200,146,74,.25); }
.tag-deida  { background:rgba(100,130,210,.12); color:#9ab0e8; border:1px solid rgba(100,130,210,.22); }

/* FILTERS */
.filters { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:26px; }
.fbtn { padding:7px 16px; border-radius:20px; font-size:.74rem; letter-spacing:.07em; color:var(–tm); border:1px solid var(–border); background:transparent; cursor:pointer; transition:all .2s; }
.fbtn:hover { color:var(–text); }
.fbtn.on { background:rgba(200,146,74,.11); border-color:var(–gold); color:var(–gold); }

/* GRIDS */
.g2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.ga { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.fu  { animation:fadeUp .5s ease both; }
.fu1 { animation:fadeUp .5s .08s ease both; }
.fu2 { animation:fadeUp .5s .16s ease both; }
.fu3 { animation:fadeUp .5s .24s ease both; }

/* HOME */
.hero { text-align:center; padding:20px 0 52px; }
.hero-title { background:linear-gradient(145deg,var(–cream) 0%,var(–goldl) 55%,var(–rosel) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:14px; }
.hero-sub { color:var(–tm); max-width:460px; margin:0 auto 28px; font-size:.95rem; line-height:1.8; }
.hero-partner { font-style:italic; font-weight:300; }
.name-row { display:flex; align-items:center; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px; }
.name-inp { background:var(–card); border:1px solid var(–border); border-radius:8px; color:var(–text); font-family:‘Jost’,sans-serif; font-size:.88rem; padding:10px 15px; outline:none; width:160px; transition:border-color .2s; }
.name-inp:focus { border-color:var(–gold); }
.name-inp::placeholder { color:var(–td); }
.amp-sym { font-family:‘Cormorant Garamond’,serif; font-size:1.6rem; color:var(–gold); }
.whisp-card { display:flex; flex-direction:column; gap:13px; }
.whisp-time { font-size:.67rem; letter-spacing:.13em; text-transform:uppercase; color:var(–gold); }
.whisp-text { font-family:‘Cormorant Garamond’,serif; font-size:1.12rem; font-style:italic; line-height:1.7; color:var(–cream); }
.trad-card { display:flex; flex-direction:column; gap:9px; cursor:pointer; text-align:left; }
.trad-card h4 { font-size:1.45rem; }
.trad-card p { color:var(–tm); font-size:.85rem; }
.trad-card .tcard-link { font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(–td); margin-top:auto; }
.tc-rose h4 { color:var(–rosel); }
.tc-gold h4 { color:var(–goldl); }
.tc-blue h4 { color:#9ab0e8; }
.tc-violet h4 { color:#c09ae0; }
.sec-hdr { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.qnav-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-top:26px; }
.qnav-item { display:flex; flex-direction:column; align-items:center; gap:5px; padding:16px 8px; cursor:pointer; text-align:center; }
.qnav-em { font-size:1.2rem; color:var(–gold); }
.qnav-lbl { font-size:.76rem; color:var(–text); }

/* POSITIONS */
.pos-card { display:flex; flex-direction:column; gap:9px; cursor:pointer; }
.pos-top { display:flex; align-items:flex-start; justify-content:space-between; }
.pos-em { font-size:2rem; }
.new-badge { font-size:.6rem; letter-spacing:.09em; text-transform:uppercase; color:var(–rosel); background:rgba(192,65,95,.12); border:1px solid rgba(192,65,95,.22); padding:2px 8px; border-radius:10px; }
.fav-btn { font-size:1.2rem; color:var(–td); background:none; border:none; cursor:pointer; line-height:1; transition:color .2s; }
.fav-btn.on { color:var(–rose); }
.pos-name { font-family:‘Cormorant Garamond’,serif; font-size:1.2rem; color:var(–cream); }
.pos-desc { color:var(–tm); font-size:.85rem; flex:1; }
.pos-meta { display:flex; justify-content:space-between; font-size:.7rem; color:var(–td); margin-top:4px; }
.det-head { display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }
.det-em { font-size:3rem; }
.det-sub { display:flex; gap:16px; font-size:.76rem; color:var(–td); flex-wrap:wrap; margin:8px 0; }
.det-desc { white-space:pre-line; color:var(–tm); max-width:680px; line-height:1.92; margin-bottom:34px; font-size:.93rem; }
.det-sec { font-family:‘Cormorant Garamond’,serif; font-size:1.18rem; color:var(–goldl); margin-bottom:14px; }
.steps-list { list-style:none; display:flex; flex-direction:column; gap:13px; max-width:680px; margin-bottom:34px; }
.step-row { display:flex; gap:13px; align-items:flex-start; }
.step-n { flex-shrink:0; width:26px; height:26px; border-radius:50%; border:1px solid var(–border); display:flex; align-items:center; justify-content:center; font-size:.7rem; color:var(–gold); margin-top:2px; }
.step-row p { color:var(–tm); line-height:1.72; font-size:.9rem; }
.bens { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:34px; }
.ben { font-size:.78rem; color:var(–tm); background:var(–surf); border:1px solid var(–border); padding:5px 12px; border-radius:20px; }
.tip-box { display:flex; gap:13px; background:rgba(200,146,74,.06); border:1px solid rgba(200,146,74,.15); border-radius:12px; padding:18px 20px; max-width:680px; }
.tip-box p { color:var(–tm); font-size:.88rem; line-height:1.82; }

/* SEQUENCES */
.seq-card { cursor:pointer; }
.seq-hdr { display:flex; justify-content:space-between; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
.seq-tags { display:flex; gap:6px; margin-bottom:7px; }
.seq-mood { font-size:.62rem; letter-spacing:.09em; text-transform:uppercase; padding:2px 9px; border-radius:10px; }
.mood-soft { background:rgba(192,65,95,.1); color:var(–rosel); border:1px solid rgba(192,65,95,.2); }
.mood-passionate { background:rgba(200,146,74,.1); color:var(–goldl); border:1px solid rgba(200,146,74,.2); }
.mood-meditative { background:rgba(100,130,210,.1); color:#9ab0e8; border:1px solid rgba(100,130,210,.2); }
.seq-name { font-family:‘Cormorant Garamond’,serif; font-size:1.5rem; color:var(–cream); }
.seq-dur { font-size:.76rem; color:var(–gold); white-space:nowrap; }
.seq-desc { color:var(–tm); font-size:.85rem; margin-bottom:16px; }
.seq-phases-row { display:flex; border:1px solid var(–border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.sph { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 6px; border-right:1px solid var(–border); background:var(–surf); text-align:center; }
.sph:last-child { border-right:none; }
.sph-n { width:18px; height:18px; border-radius:50%; background:rgba(200,146,74,.14); color:var(–gold); font-size:.62rem; display:flex; align-items:center; justify-content:center; }
.sph-nm { font-size:.68rem; color:var(–tm); }
.sph-d { font-size:.6rem; color:var(–td); }
.pnav { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px; }
.pnav-btn { display:flex; align-items:center; gap:7px; padding:9px 15px; border-radius:7px; border:1px solid var(–border); color:var(–tm); font-size:.78rem; cursor:pointer; background:transparent; transition:all .2s; }
.pnav-btn:hover { border-color:rgba(200,146,74,.3); color:var(–text); }
.pnav-btn.on { background:rgba(200,146,74,.1); border-color:var(–gold); color:var(–gold); }
.pnav-n { width:18px; height:18px; border-radius:50%; background:rgba(200,146,74,.14); color:var(–gold); font-size:.62rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.phase-box { padding:26px; }
.phase-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.phase-t { font-size:.76rem; color:var(–gold); }
.phase-inst { color:var(–tm); line-height:1.9; max-width:620px; margin-bottom:26px; font-size:.92rem; }
.phase-btns { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.done-msg { display:flex; align-items:center; gap:10px; color:var(–gold); font-style:italic; font-size:.9rem; }

/* PRACTICES */
.trad-btns { display:flex; gap:7px; margin-bottom:12px; flex-wrap:wrap; }
.trbtn { padding:9px 19px; border-radius:20px; font-size:.76rem; letter-spacing:.07em; border:1px solid var(–border); color:var(–tm); background:transparent; cursor:pointer; transition:all .2s; }
.trbtn.t-all    { background:rgba(200,146,74,.09); border-color:var(–gold); color:var(–goldl); }
.trbtn.t-tantra { background:rgba(192,65,95,.1); border-color:var(–rose); color:var(–rosel); }
.trbtn.t-tao    { background:rgba(200,146,74,.1); border-color:var(–gold); color:var(–goldl); }
.trbtn.t-deida  { background:rgba(100,130,210,.1); border-color:rgba(100,130,210,.4); color:#9ab0e8; }
.type-row { display:flex; gap:6px; margin-bottom:26px; }
.tybtn { padding:6px 13px; border-radius:12px; font-size:.7rem; border:1px solid var(–border); color:var(–td); background:transparent; cursor:pointer; transition:all .2s; }
.tybtn.on { border-color:rgba(200,146,74,.3); color:var(–tm); }
.prac-list { display:flex; flex-direction:column; gap:3px; margin-bottom:50px; }
.prac-item { background:var(–card); border:1px solid var(–border); border-radius:12px; overflow:hidden; transition:border-color .2s; }
.prac-item.open { border-color:rgba(200,146,74,.25); }
.prac-hdr { display:flex; align-items:center; justify-content:space-between; padding:20px 22px; cursor:pointer; gap:12px; }
.prac-hdr:hover { background:rgba(255,255,255,.018); }
.prac-tags { display:flex; gap:6px; margin-bottom:6px; }
.prac-type { font-size:.6rem; letter-spacing:.09em; text-transform:uppercase; color:var(–td); border:1px solid var(–border); padding:2px 8px; border-radius:10px; }
.prac-name { font-family:‘Cormorant Garamond’,serif; font-size:1.22rem; color:var(–cream); margin-bottom:3px; }
.prac-dur { font-size:.7rem; color:var(–td); }
.prac-toggle { font-size:1.4rem; color:var(–gold); flex-shrink:0; }
.prac-body { padding:0 22px 24px; border-top:1px solid var(–border); padding-top:20px; }
.prac-descr { color:var(–tm); font-size:.9rem; line-height:1.85; max-width:660px; margin-bottom:18px; }
.prac-src { font-size:.73rem; color:var(–td); padding-top:13px; border-top:1px solid var(–border); }
.phil-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.phil-c { display:flex; flex-direction:column; gap:9px; }
.phil-n { font-family:‘Cormorant Garamond’,serif; font-size:1.35rem; }
.ph-rose .phil-n { color:var(–rosel); } .ph-gold .phil-n { color:var(–goldl); } .ph-blue .phil-n { color:#9ab0e8; }
.phil-q { font-family:‘Cormorant Garamond’,serif; font-style:italic; font-size:.97rem; color:var(–tm); padding-left:12px; border-left:2px solid var(–border); }
.phil-b { font-size:.82rem; color:var(–td); line-height:1.76; }

/* DEIDA PAGE */
.deida-hero { text-align:center; padding:10px 0 50px; }
.deida-title { background:linear-gradient(145deg,#c8b0f0,#9ab0e8,var(–goldl)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.deida-subtitle { color:var(–tm); max-width:500px; margin:14px auto 0; font-size:.95rem; line-height:1.82; }
.book-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px; }
.book-tab { padding:9px 18px; border-radius:20px; font-size:.74rem; letter-spacing:.07em; border:1px solid var(–border); color:var(–tm); background:transparent; cursor:pointer; transition:all .22s; }
.book-tab:hover { color:var(–text); }
.book-tab.on { background:rgba(100,130,210,.12); border-color:rgba(100,130,210,.4); color:#9ab0e8; }
.wisdom-grid { display:flex; flex-direction:column; gap:20px; }
.wisdom-card { background:var(–card); border:1px solid var(–border); border-radius:14px; padding:28px 28px 22px; position:relative; overflow:hidden; transition:transform .25s,border-color .25s,box-shadow .25s; }
.wisdom-card::before { content:’’; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(–rose),var(–gold)); }
.wisdom-card:hover { transform:translateY(-2px); border-color:rgba(160,110,200,.3); box-shadow:0 8px 40px rgba(0,0,0,.5); }
.wisdom-book { font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:#9ab0e8; margin-bottom:14px; display:block; }
.wisdom-quote { font-family:‘Cormorant Garamond’,serif; font-size:clamp(1.1rem,2.5vw,1.42rem); font-style:italic; line-height:1.75; color:var(–cream); margin-bottom:18px; }
.wisdom-quote::before { content:’\201C’; color:var(–gold); font-size:2rem; line-height:0; vertical-align:-.4em; margin-right:4px; }
.wisdom-quote::after  { content:’\201D’; color:var(–gold); font-size:2rem; line-height:0; vertical-align:-.4em; margin-left:4px; }
.wisdom-insight { color:var(–tm); font-size:.88rem; line-height:1.82; padding:14px 16px; background:rgba(255,255,255,.03); border-radius:8px; border-left:2px solid rgba(200,146,74,.2); }
.wisdom-insight strong { color:var(–goldl); font-weight:400; }
.wisdom-footer { display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:10px; }
.wisdom-theme { display:flex; gap:6px; flex-wrap:wrap; }
.w-theme { font-size:.62rem; letter-spacing:.09em; text-transform:uppercase; padding:3px 10px; border-radius:10px; background:rgba(100,130,210,.1); color:#9ab0e8; border:1px solid rgba(100,130,210,.18); }
.deida-strip { background:linear-gradient(135deg,rgba(100,80,180,.08),rgba(192,65,95,.06)); border:1px solid rgba(100,130,210,.18); border-radius:14px; padding:32px; text-align:center; }
.deida-strip h3 { color:#c8b0f0; margin-bottom:12px; }
.deida-strip p { color:var(–tm); max-width:520px; margin:0 auto 22px; line-height:1.82; }

/* SHARE */
.share-tabs { display:flex; gap:2px; margin-bottom:26px; background:var(–card); border:1px solid var(–border); border-radius:12px; padding:4px; width:fit-content; }
.stab { padding:8px 17px; border-radius:9px; font-size:.76rem; letter-spacing:.07em; color:var(–tm); cursor:pointer; background:transparent; border:none; transition:all .2s; }
.stab:hover { color:var(–text); }
.stab.on { background:var(–muted); color:var(–cream); }
.compose-wrap { max-width:660px; }
.compose-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:13px; font-size:.82rem; color:var(–tm); flex-wrap:wrap; gap:10px; }
.compose-top strong { color:var(–goldl); }
.mood-row { display:flex; gap:5px; }
.mbtn { padding:5px 11px; border-radius:11px; font-size:.68rem; border:1px solid var(–border); color:var(–td); cursor:pointer; background:transparent; transition:all .2s; }
.mbtn.on { background:var(–muted); border-color:rgba(200,146,74,.3); color:var(–text); }
.msg-ta { width:100%; background:var(–surf); border:1px solid var(–border); border-radius:8px; color:var(–text); font-family:‘Cormorant Garamond’,serif; font-size:1.08rem; font-style:italic; line-height:1.72; padding:15px; resize:vertical; outline:none; transition:border-color .2s; margin-bottom:12px; }
.msg-ta:focus { border-color:var(–rose); }
.msg-ta::placeholder { color:var(–td); }

positions:[
  {id:'yab-yum',name:'Yab-Yum',tradition:'tantra',difficulty:'beginner',focus:['chakra','breathwork','connection'],duration:'20–40 min',emoji:'🌀',shortDesc:'The sacred union posture of Tibetan Tantra — face to face, heart to heart.',description:'Yab-Yum ("father-mother" in Tibetan) is the foundational pose of sacred union. The receptive partner sits in the lap of the active partner, legs wrapped around the waist, foreheads touching. Spines tall, hearts open.\n\nThe practice involves synchronized breathing — inhaling and exhaling together — creating a shared energy circuit through the chakras. The focus is not movement but stillness, presence, and the merging of two energies into one unified field.',steps:['Active partner sits cross-legged, spine tall, heart open — become a still mountain of presence.','Receptive partner faces them, wrapping legs around the waist and arms over the shoulders.','Let your chests touch. Feel the warmth between your hearts.','Synchronize your breath: inhale together for 4 counts, exhale together for 4 counts.','With each inhale, draw energy up the spine. With each exhale, let it radiate from the heart outward.','Maintain soft eye contact or rest forehead to forehead. Stay still for at least 10 minutes.'],benefits:['Deep emotional bonding','Chakra alignment','Nervous system co-regulation','Heightened intimacy without pressure'],tip:'Play a Tibetan singing bowl recording or deep drone music to deepen the stillness.',featured:true,new:false},
  {id:'shakti-wave',name:'Shakti Wave',tradition:'tantra',difficulty:'intermediate',focus:['energy','feminine','movement'],duration:'15–30 min',emoji:'🌊',shortDesc:'Riding the feminine current — a slow, undulating energy practice that honors radiance.',description:'The Shakti Wave invites the feminine partner to move freely, trusting her body\'s natural rhythm while the masculine partner remains grounded. The movement is not choreographed — it flows from sensation, from breath, from the rising tide of Shakti energy.\n\nThis practice honors the feminine as the living creative force — spontaneous, expressive, luminous.',steps:['Sit or lie together. Breathe deeply for 2–3 minutes, arriving fully into your bodies.','The masculine partner becomes completely still — a grounded, witnessing presence.','The feminine partner begins to move, slowly following whatever her body wants to express.','Let breath and movement expand organically — waves up the spine, arms rising, sounds emerging naturally.','Masculine: do not direct or react. Simply witness with complete loving attention.','After 15–20 minutes, come together in stillness. Rest forehead to forehead.'],benefits:['Feminine embodiment & aliveness','Trust and authentic surrender','Creative energy activation','Masculine presence training'],tip:'"The feminine moves in waves of emotion; the masculine provides the unchanging ground." — David Deida',featured:false,new:true},
  {id:'valley',name:'Valley Orgasm',tradition:'tao',difficulty:'advanced',focus:['energy cultivation','longevity','multi-orgasmic'],duration:'45–90 min',emoji:'🏔️',shortDesc:'The Taoist art of expanding bliss without discharge — energy cultivation at its peak.',description:'The Valley Orgasm is a cornerstone of Taoist sexual practice. Rather than rushing toward a peak that releases and depletes built energy, this practice involves riding the edge of high arousal then consciously descending — circulating that energy through the body\'s meridians with breath and intention.\n\nWith practice, both partners enter extended states of whole-body pleasure without depletion, feeling energized and deeply connected afterward.',steps:['Begin with 10 minutes of connected breathing and soft eye gazing.','Move into intimacy slowly, building arousal over 10–15 minutes — no rushing.','As arousal approaches 70–80%, both partners PAUSE completely. Draw breath up the spine.','Hold still for 1–2 minutes. Feel the energy expand into the whole body.','Rest in the "valley" — a plateau of full-body warmth and exquisite sensitivity.','Resume gently. Repeat this cycle 3–5 times before resting in integration.'],benefits:['Multi-orgasmic states for both partners','Jing (vital essence) conservation','Post-intimacy vitality','Deepened energetic bonding'],tip:'Mantak Chia\'s "The Multi-Orgasmic Couple" is the essential guide for mastering this practice.',featured:true,new:false},
  {id:'jade',name:'Jade Garden',tradition:'tao',difficulty:'beginner',focus:['yin-yang','harmony','chi'],duration:'20–40 min',emoji:'🌿',shortDesc:'Balancing the yin-yang energies through gentle, wavelike, unhurried movement.',description:'In Taoist thought, healthy intimacy is about harmonizing complementary forces — yin and yang, water and fire. The Jade Garden uses slow circular movement and conscious breath to create this balance, circulating chi between partners like a living river.',steps:['Begin connected: receptive partner below, active partner above, moving very slowly.','Start with circular hip movement — imagine drawing a slow figure-eight.','Establish a shared breath: inhale drawing inward, exhale as you expand.','The active partner visualizes warm golden chi flowing from their dantian to their partner.','The receptive partner receives this energy, letting it fill the pelvic bowl and radiate upward.','Maintain this slow wavelike rhythm for 20–30 minutes. Do not push toward any peak.'],benefits:['Chi cultivation and circulation','Pelvic health and muscle tone','Energetic balance','Deeply meditative intimacy'],tip:'The lower dantian — 3 fingers below the navel — is the seat of sexual energy in Taoist practice.',featured:false,new:false},
  {id:'firebird',name:'Firebird',tradition:'tantra',difficulty:'intermediate',focus:['passion','kundalini','fire'],duration:'15–25 min',emoji:'🔥',shortDesc:'Igniting the Kundalini fire — passionate, fully embodied, completely alive.',description:'Some Tantric sessions call for fire, not stillness. The Firebird combines dynamic movement with intense breath to activate Kundalini — the coiled serpent energy at the base of the spine. Rather than suppressing this fire, the practice channels it upward through all the chakras, transforming raw desire into pure radiance.',steps:['Begin with 3 minutes of synchronized Breath of Fire: rapid rhythmic equal inhale-exhale through the nose.','Move into position: receptive partner on hands and knees; active partner behind, connected.','Build movement gradually, letting breath lead — allow energy to rise like heat.','As intensity builds, consciously draw it up the spine rather than concentrating it genitally.','Let sound emerge freely — sighs, tones, roars — whatever is authentic.','Slow gradually and end lying face-to-face in soft integrated silence.'],benefits:['Kundalini activation','Full-body energy release','Primal uninhibited connection','Physical vitality and aliveness'],tip:'"Enlightened sex is not transcending desire — it is bringing your absolute presence into the fire of desire itself." — David Deida',featured:false,new:true},
  {id:'deida-edge',name:'Edge of Surrender',tradition:'deida',difficulty:'advanced',focus:['masculine presence','feminine surrender','polarity'],duration:'20–45 min',emoji:'⚡',shortDesc:'Radical masculine presence meeting full feminine surrender — awakening electric polarity.',description:'David Deida teaches that the deepest intimacy emerges from polarity — the magnetic charge between masculine and feminine essences. The masculine partner leads with grounded, undistracted presence; the feminine partner practices surrendering fully into that presence.\n\nThis is not about control — it is the conscious dance of energies that creates genuine aliveness between partners.',steps:['Masculine partner: sit upright, close eyes, meditate for 5 full minutes. Breathe. Become a mountain.','Feminine partner: approach and begin moving around your partner — playful, expressive, testing.','Masculine: do not chase, react, or be destabilized. Simply witness with warm unbroken attention.','When the feminine feels the masculine\'s unwavering presence, begin to soften into it. Lean in. Breathe.','Transition naturally into held embrace — masculine remaining utterly present throughout.','Feminine: practice surrendering the need to control. Trust the ground beneath you.'],benefits:['Deep polarity activation','Profound trust between partners','Presence as daily practice','Renewed erotic aliveness'],tip:'"A man\'s gift to his woman is his presence. Her gift to him is her radiance." — David Deida',featured:true,new:true},
],
sequences:[
  {id:'reconnect',name:'Deep Reconnection',duration:'60–90 min',tradition:'tantra',mood:'soft',difficulty:'beginner',description:'A tender heart-opening sequence for reconnecting after distance or time apart. Prioritizes emotional safety and genuine presence over intensity.',phases:[{name:'Opening',duration:'15 min',instruction:'Begin lying side by side, fully clothed. Place your right hand over your partner\'s heart. Breathe together slowly. Speak one true thing you appreciate about them.'},{name:'Attunement',duration:'20 min',instruction:'Move into Yab-Yum — the sacred seated union posture. Synchronize your breathing completely. Rest foreheads together. Release every agenda.'},{name:'Flow',duration:'30–45 min',instruction:'Transition naturally to Jade Garden — slow, circular, unhurried. Focus entirely on sensation and the sound of your partner\'s breath.'},{name:'Integration',duration:'10 min',instruction:'Return to complete stillness. Lie facing each other. Stay in silence for 5 full minutes — eyes open, simply being witnessed.'}],tip:'Turn your phones to airplane mode before beginning. Let the world wait.'},
  {id:'fire',name:'Fire & Surrender',duration:'45–75 min',tradition:'deida',mood:'passionate',difficulty:'intermediate',description:'A journey from grounded masculine presence to fiery union to soft integration — the complete arc of Deida\'s polarity teaching in lived practice.',phases:[{name:'Grounding',duration:'10 min',instruction:'Masculine partner meditates alone in stillness. Feminine partner prepares the space — lighting, scent, her own presence.'},{name:'Polarity',duration:'15 min',instruction:'Practice the Edge of Surrender — masculine holding absolute ground, feminine expressing her full aliveness, testing the presence.'},{name:'Fire',duration:'20–30 min',instruction:'Move into the Firebird. Let breath and sound be full and free. Bring complete presence into the fire — don\'t manage it, enter it.'},{name:'Return',duration:'10 min',instruction:'Slow gradually into Yab-Yum — breathing together, hearts touching, stillness. Whisper one true thing.'}],tip:'"Don\'t seek to quench the fire — learn to surf it with your whole self." — David Deida'},
  {id:'tao',name:'Taoist Cultivation',duration:'75–120 min',tradition:'tao',mood:'meditative',difficulty:'advanced',description:'A full Taoist lovemaking session focused on energy exchange, the valley orgasm cycle, and microcosmic orbit. Leave feeling replenished and deeply alive.',phases:[{name:'Dantian Activation',duration:'15 min',instruction:'Sit back-to-back. Place hands over your lower dantian (3 fingers below navel). Breathe into this point for 10 minutes, building warmth there.'},{name:'Chi Harmonizing',duration:'20 min',instruction:'Move into Jade Garden — slow, circular, wavelike. Build heat gradually like coals, not fire. There is nowhere to rush.'},{name:'Valley Cultivation',duration:'30–60 min',instruction:'Practice the Valley Orgasm cycle together. Rise to 70–80% arousal, pause, circulate upward, rest in the plateau. Repeat 4–6 cycles.'},{name:'Microcosmic Orbit',duration:'10 min',instruction:'Lie together. Visualize golden energy rising up both your spines simultaneously and cascading down the front of your bodies. Rest in this shared circuit for 10 minutes.'}],tip:'The ancient Taoists measured sexual mastery not by the intensity of the experience, but by the vitality of the morning after.'},
  {id:'sunday',name:'Sunday Morning',duration:'30–45 min',tradition:'tantra',mood:'soft',difficulty:'beginner',description:'A light warm playful sequence for slow mornings — no pressure, no destination, just full presence and deep enjoyment of each other.',phases:[{name:'Wake-up Breath',duration:'5 min',instruction:'Before rising, face each other. Take 10 slow deep breaths together. Let your eyes be soft. Smile.'},{name:'Gentle Awakening',duration:'10 min',instruction:'One partner offers a slow full-body touch — unhurried, present. Simply the gift of being truly felt.'},{name:'Shakti Play',duration:'15–25 min',instruction:'Practice the Shakti Wave. Masculine holds the space with steady warmth; feminine moves freely, following sensation. No destination required.'}],tip:'Keep it light. Make each other laugh. Sunday mornings should always feel like coming home.'},
],
practices:[
  {id:'orbit',name:'Microcosmic Orbit',tradition:'tao',type:'solo',duration:'15–20 min',description:'The foundational Taoist meditation for circulating sexual energy through the body\'s channels rather than discharging it. Transforms arousal into radiance.',steps:['Sit comfortably, spine tall. Tongue to the roof of your mouth — this completes the energy circuit.','Breathe deeply and place awareness at your lower dantian (3 fingers below the navel).','With each inhale, visualize warm golden light rising from the dantian, up the spine, over the crown.','With each exhale, guide it down the front of the body — throat, heart, belly, back to dantian.','Continue for 15–20 minutes. The circuit becomes more vivid with regular practice.'],source:'Mantak Chia, "Taoist Secrets of Love"'},
  {id:'presence',name:'Masculine Presence Training',tradition:'deida',type:'solo',duration:'10 min daily',description:'David Deida\'s core teaching: a man\'s greatest gift to his partner is his undivided loving presence. This daily practice trains that capacity like a muscle.',steps:['Sit in meditation. Set a timer for 10 minutes.','Notice every impulse to plan, remember, or mentally escape. Simply return to this moment.','Breathe. Feel your feet. Feel the weight of your body. This is presence.','Visualize your partner. Without wanting anything, offer her your complete loving attention.','Each time you drift, simply return. Presence is not a state you achieve — it\'s where you keep returning.'],source:'David Deida, "The Way of the Superior Man"'},
  {id:'breathfire',name:'Kundalini Breath of Fire',tradition:'tantra',type:'couples',duration:'5–10 min',description:'A powerful Kundalini breathing technique to rapidly awaken and circulate sexual-creative energy before intimacy or as a standalone energizer.',steps:['Sit facing each other, cross-legged. Make soft eye contact.','Begin Breath of Fire: rapid rhythmic equal inhale-exhale through the nose. Navel pumps with each breath.','Start slow (1 breath/second), gradually increasing to 2–3 breaths/second.','Continue for 3 minutes. Deep inhale, hold, visualize energy flooding every cell. Release slowly.','Sit in silence together for 2 minutes. Notice the aliveness moving through your bodies.'],source:'Kundalini Yoga tradition, 3HO Foundation'},
  {id:'chakra',name:'Couples Chakra Activation',tradition:'tantra',type:'couples',duration:'20–30 min',description:'A journey through the seven energy centers together — breathwork, touch, sacred sound, and visualization from root to crown.',steps:['Root: place hands on each other\'s knees. Tone "LAM" three times together.','Sacral: hands to hips. Tone "VAM". Feel warmth and creativity awakening.','Solar Plexus: hands on each other\'s belly. Tone "RAM". Breathe into your power.','Heart: hands over each other\'s hearts. Tone "YAM". Stay here three extra breaths.','Throat & Third Eye: touch throat, then forehead. Tone "HAM" then "OM".','Crown: raise joined hands above your heads. Breathe in silence for 2 full minutes.'],source:'Classical Tantric texts, adapted from Anodea Judith'},
  {id:'desire',name:'The Gift of Full Desire',tradition:'deida',type:'couples',duration:'15–20 min',description:'Deida teaches that suppressing desire out of politeness shrinks the space between partners. This practice invites full, unfiltered expression of genuine desire.',steps:['Sit facing each other. Soft eye contact. Breathe three times together.','Masculine partner: speak slowly what you genuinely desire — be specific. Be here.','Feminine partner: receive this. Notice what arises in your body and speak it without filtering.','Hold each other\'s gaze. Let there be silence and awkwardness. That edge is authenticity.','Transition into whatever naturally arises from this honesty.'],source:'David Deida, "Dear Lover" & "Blue Truth"'},
],
deida:[
  {id:'d1',book:'The Way of the Superior Man',quote:'The most loving thing a man can do for his woman is to be so present — so full of depth and consciousness — that she can safely surrender into love, and stop fighting to hold everything together herself.',insight:'Deida teaches that the masculine\'s primary gift is not romance or gifts but the quality of his <strong>presence</strong>. When a man is truly present — not planning, not distracted — the feminine can finally relax into her own depth. This is the foundation of genuine polarity.',themes:['presence','masculine','polarity']},
  {id:'d2',book:'The Way of the Superior Man',quote:'Your woman knows your weaknesses better than anyone. She will find every crack in your armor and exaggerate it. She is not trying to destroy you. She is helping you discover where you are not yet free.',insight:'What Deida calls "the feminine test" is not manipulation — it is a living invitation to deepen. When your partner challenges or destabilizes you, the practice is not to react or defend, but to <strong>remain in loving presence</strong>. The man who cannot be shaken is the man she ultimately trusts.',themes:['challenge','growth','trust','masculine']},
  {id:'d3',book:'Blue Truth',quote:'You are not looking for the right partner. You are learning to be the right partner. This is the deeper practice — to discover, beneath all self-protection, the love that is your deepest nature.',insight:'The spiritual path and the intimate path are the same path. Every moment of genuine connection is also a moment of <strong>self-discovery</strong>. Intimacy is not a goal to achieve but a mirror of your own depth.',themes:['self-knowledge','love','spiritual practice']},
  {id:'d4',book:'Dear Lover',quote:'The feminine is like water — it needs a riverbank to know its own depth, its own direction, its own power. Without the masculine shore, the water spreads thin and goes nowhere.',insight:'The "riverbank" is not control — it is <strong>loving structure</strong>: consciousness, direction, rootedness. The feminine\'s radiance and depth are not diminished by this; they are revealed by it. Both elements are necessary; neither is superior.',themes:['feminine','polarity','flow','structure']},
  {id:'d5',book:'Intimate Communion',quote:'Most people are looking for intimacy so they can feel safe. But real intimacy begins where safety ends — where you are seen fully, in the places you are most afraid to show.',insight:'True intimacy requires <strong>full visibility</strong> — being seen in our shame, our longing, our wildness, our tenderness. Couples often cultivate a comfortable closeness that actually keeps the deepest knowing at bay. The practice is to risk being truly known.',themes:['vulnerability','authenticity','depth','intimacy']},
  {id:'d6',book:'The Way of the Superior Man',quote:'Whatever you are doing, feel your heart — alive, open, loving. This is the practice. Not later, not after your plans are complete. Now. In this moment, with this person.',insight:'For Deida, <strong>the heart is the spiritual organ of intimacy</strong>. Not the mind\'s analysis of what love should look like — the open, feeling heart that is present without agenda. Can you open your heart more, now?',themes:['heart','presence','now','love']},
  {id:'d7',book:'Blue Truth',quote:'She does not want a man who agrees with her. She wants a man who loves her so completely that he will tell her the truth, even when it is uncomfortable. Especially then.',insight:'Deida distinguishes <strong>comfortable love</strong> — accommodating, avoidant of friction — from <strong>true love</strong>, which includes the courage to be honest. The man who tells soft lies to keep the peace is ultimately less trustworthy than the one who speaks with both honesty and love.',themes:['truth','masculine','trust','courage']},
  {id:'d8',book:'Intimate Communion',quote:'Sexual polarity is not between men and women — it is between masculine and feminine essences. It can exist in any pairing. Without it, you have companionship. With it, you have electricity.',insight:'<strong>Polarity is energetic, not gender-based</strong>. In any relationship, one partner tends toward the masculine essence (presence, direction, depth) and one toward the feminine (radiance, flow, aliveness). When both collapse into sameness through comfort, the erotic charge disappears. Polarity is cultivated.',themes:['polarity','essence','erotic energy','electricity']},
],

const tagH=t=>`<span class="tag tag-${t}">${t}</span>`;

function go(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  document.querySelectorAll('[data-p]').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  S.page=p; window.scrollTo(0,0);
  ({home:renderHome,positions:renderPositions,sequences:renderSequences,practices:renderPractices,deida:renderDeida,share:renderShare,whispers:renderWhispers})[p]?.();
}

const di=dayI();
const WM={morning:{lbl:‘Morning’,em:‘🌅’,cls:‘twg’},evening:{lbl:‘Evening’,em:‘🌙’,cls:‘twr’},game:{lbl:‘Game’,em:‘🎲’,cls:‘twb’},tease:{lbl:‘Tease’,em:‘🔥’,cls:‘twg’}};
const todayItems=[{lbl:‘Morning’,em:‘🌅’,cls:‘twg’,text:D.whispers.morning[di%D.whispers.morning.length]},{lbl:‘Evening’,em:‘🌙’,cls:‘twr’,text:D.whispers.evening[di%D.whispers.evening.length]},{lbl:“Today’s Game”,em:‘🎲’,cls:‘twb’,text:D.whispers.games[di%D.whispers.games.length].text}];
const allW=[…D.whispers.morning.map((t,i)=>({id:‘m’+i,text:t,cat:‘morning’})),…D.whispers.evening.map((t,i)=>({id:‘e’+i,text:t,cat:‘evening’})),…D.whispers.games.map(g=>({id:g.id,text:g.text,cat:‘game’})),…D.whispers.teases.map(t=>({id:t.id,text:t.text,cat:‘tease’}))].filter(w=>S.wFilter===‘all’||w.cat===S.wFilter);
document.getElementById(‘pg-whispers’).innerHTML=`<div class="container"><span class="label fu">Daily Rituals</span><h1 class="fu1">Daily Whispers</h1><p class="fu2" style="color:var(--tm);max-width:440px;margin-bottom:32px">Fresh prompts each day. Moments to pause, feel, and reach toward each other.</p><span class="label">Today's Picks</span><div class="today-g">${todayItems.map(item=>{const rev=S.wRevealed[item.lbl];return `<div class="card tw-c ${item.cls}"><div class="tw-hdr"><span class="tw-em">${item.em}</span><span class="tw-lbl">${item.lbl}</span></div>${rev?`<p class="tw-txt">${esc(item.text)}</p><button class="btn btn-ghost btn-sm" onclick="qShare(${JSON.stringify(item.text)})">Share ↗</button>`:`<button class="reveal-btn" onclick="S.wRevealed[${JSON.stringify(item.lbl)}]=true;renderWhispers()">Reveal ✦</button>`}</div>`;}).join('')}</div><div class="divider"></div><span class="label" style="margin-bottom:16px;display:block">Full Library</span><div class="filters">${['all','morning','evening','game','tease'].map(c=>`<button class="fbtn ${S.wFilter===c?'on':''}" onclick="S.wFilter='${c}';renderWhispers()">${c===‘all’?‘All’:(WM[c]?.em+’ ’+WM[c]?.lbl)}</button>`).join('')}</div><div class="w-grid fu1">${allW.map(w=>`<div class="card wc"><div class="wc-cat">${WM[w.cat]?.em} ${WM[w.cat]?.lbl}</div><p class="wc-txt">${esc(w.text)}</p><button class="btn btn-ghost btn-sm" onclick="qShare(${JSON.stringify(w.text)})">Share ↗</button></div>`).join('')}</div></div>`;}

go(‘home’);
</script>
